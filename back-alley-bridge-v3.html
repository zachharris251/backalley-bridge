    return '<span class="' + cls + (red ? ' red' : ' black') + '">' +
      '<span class="corner tl"><span class="cr">' + rk + '</span><span class="cs">' + sym + '</span></span>' +
      center +
      '<span class="corner br"><span class="cr">' + rk + '</span><span class="cs">' + sym + '</span></span></span>';
  }

  // ----------------------------------------------------------- render dispatch
  function render() {
    syncChat();
    if (MODE === 'home' || MODE === 'gameSetup') return renderGameSetup();
    if (MODE === 'onlineLobby') return renderLobby();
    if (MODE === 'localGame' || MODE === 'onlineGame') return renderTable();
    renderGameSetup();
  }
  function syncChat() {
    if (MODE === 'onlineGame' && roomCode && db) {
      if (!chatRef) startChat();
      renderChat();
    } else if (chatRef || document.getElementById('chatPanel')) {
      stopChat();
    }
  }

  function renderGameSetup() {
    var m = GAME_META[GAME];
    var online = window.firebase
      ? '<button class="btn" data-act="go-online">Play online</button>'
      : '<button class="btn" disabled>Play online</button>' +
        '<div class="note warn-note">The Firebase scripts could not load (offline or blocked), so online play is unavailable right now. Play vs bots still works.</div>';
    var opts = '';
    if (m.strict) {
      opts += '<div class="field"><label for="strictModeInput">Card restrictions</label>' +
        '<select id="strictModeInput" style="width:100%;background:#11150f;color:var(--bone);border:1px solid var(--line);border-radius:4px;padding:11px 12px;font-size:16px;font-family:var(--body)">' +
          '<option value="true"' + (strictMode ? ' selected' : '') + '>Strict (only show legal cards)</option>' +
          '<option value="false"' + (!strictMode ? ' selected' : '') + '>Permissive (show all cards, penalize reneges)</option>' +
        '</select></div>';
    }
    app.innerHTML =
      '<div class="home-hero" style="padding-top:4px">' +
        '<div class="eyebrow">Partnership card game</div>' +
        '<h1 style="font-size:34px">' + m.title + '</h1>' +
        '<div class="stencil-rule"></div><div class="sub">' + m.blurb + '</div></div>' +
      '<div class="card-panel" style="max-width:420px;margin:14px auto 0;">' +
        '<div class="field"><label for="nameInput">Your name</label>' +
        '<input id="nameInput" type="text" maxlength="18" placeholder="' + esc(myName) + '" value="' + (myName === 'You' ? '' : esc(myName)) + '"></div>' +
        opts +
        '<div class="home-actions">' +
          '<button class="btn-accent btn" data-act="local-start">Play vs bots</button>' +
          online +
        '</div>' +
      '</div>';
  }

  // ----------------------------------------------------------- lobby (online)
  function currentSeats() {
    if (STATE && STATE.seats && (MODE === 'onlineGame' || MODE === 'localGame')) return STATE.seats;
    if (room && room.seats) return arrayToSeats(room.seats);
    return {};
  }
  function seatArray() {
    var seats = currentSeats(), arr = [];
    for (var i = 0; i < 4; i++) arr.push(seats[i] || null);
    return arr;
  }
  function computeMySeat() {
    var arr = seatArray();
    for (var i = 0; i < 4; i++) if (arr[i] && arr[i].playerId === myId) return i;
    return -1;
  }

  function renderLobby() {
    var seats = seatArray();
    var seated = computeMySeat();
    var rows = '';
    for (var i = 0; i < 4; i++) {
      var s = seats[i];
      var teamLab = (i % 2 === 0) ? 'Team A' : 'Team B';
      var youMark = (s && s.playerId === myId) ? ' you' : '';
      var occupant = s
        ? esc(s.name) + (s.isBot ? ' <span class="tag">bot</span>' : '') + (s.playerId === myId ? ' <span class="tag">you</span>' : '')
        : '<span class="muted">Open &middot; a bot fills in at start</span>';
      rows += '<div class="seat-card' + youMark + '"><div><div class="nm display">Seat ' + i + ' &middot; ' + teamLab + '</div><div style="margin-top:4px">' + occupant + '</div></div></div>';
    }
    var startBtn = isHost
      ? '<button class="btn-accent btn" data-act="start-game">Start match</button>'
      : '<div class="muted display" style="align-self:center">' +
        (seated < 0 ? 'Finding you a seat...' : 'Waiting for the host to start.') + '</div>';
    var shareBtns =
      '<div class="row" style="margin-top:6px">' +
        (navigator.share ? '<button class="btn-accent btn btn-sm" data-act="share-room">Share invite</button>' : '') +
        '<button class="btn btn-sm" data-act="copy-invite">Copy invite link</button>' +
        '<button class="btn btn-sm" data-act="copy-code">Copy code</button>' +
      '</div>';
    app.innerHTML =
      '<div class="spread" style="margin-bottom:10px"><div class="eyebrow">Room</div>' +
      '<button class="btn btn-ghost btn-sm" data-act="home">Leave</button></div>' +
      '<div class="card-panel">' +
        '<div class="spread"><div><div class="eyebrow">Share this code</div>' +
        '<div class="code-chip">' + esc(roomCode || '----') + '</div>' + shareBtns + '</div>' +
        '<div class="muted" style="max-width:240px">Everyone opens your link, taps Play online, and enters this code. No account needed. Up to four people; any open seats play as bots.</div></div>' +
        '<hr class="divider">' +
        '<div class="seat-list">' + rows + '</div>' +
        '<div class="row" style="justify-content:flex-end">' + startBtn + '</div>' +
      '</div>';
  }

  // ----------------------------------------------------------- table
  function seatPanel(seat, sideClass) {
    // Use STATE.seats during games (has bot names); fall back to currentSeats for lobby
    var s = null;
    if (STATE && STATE.seats && (MODE === 'localGame' || MODE === 'onlineGame')) {
      s = STATE.seats[seat];
    } else {
      var seats = currentSeats();
      s = seats[seat];
    }
    
    // Guarantee a valid seat object with a name
    if (!s) {
      s = { name: 'Seat ' + seat, isBot: false };
    }
    // For bots without a name, use the canonical bot names
    if (!s.name) {
      s.name = BOT_NAMES[seat] || ('Seat ' + seat);
      if (!s.isBot && !s.name) s.name = 'Seat ' + seat;
    }
    // Override "Seat N" labels with bot names for seats 1, 2, 3 if they're bots
    if (s.isBot && s.name && s.name.startsWith('Seat ')) {
      s.name = BOT_NAMES[seat] || s.name;
    }
    
    var isYou = (seat === mySeat);
    var turn = (STATE && STATE.phase === 'bidding' || STATE && STATE.phase === 'playing') && STATE && STATE.turnSeat === seat;
    var dealer = STATE && STATE.dealerSeat === seat;
    var nameLine = '<div class="nm">' + (isYou ? 'You' : esc(s.name)) +
      (s.isBot ? ' <span class="chip bot">bot</span>' : '') +
      (dealer ? ' <span class="chip">deal</span>' : '') + '</div>';

    var bidLine;
    if (STATE.bids && STATE.bids[seat]) {
      var b = STATE.bids[seat];
      var cls = b.type === 'board' ? 'board' : (b.type === 'boston' ? 'boston' : '');
      var boardTxt = { 1: 'BOARD', 2: 'DBL BOARD', 3: 'TRPL BOARD', 4: 'QUAD BOARD' };
      var txt = b.type === 'pass' ? 'pass' : (b.type === 'board' ? (boardTxt[b.level || 1] || 'BOARD') : (b.type === 'boston' ? 'BOSTON' : b.value));
      bidLine = '<span class="bidv ' + cls + '">' + txt + '</span>';
    } else {
      bidLine = '<span class="muted">--</span>';
    }
    var tricks = STATE.tricksWon ? STATE.tricksWon[seat] : 0;
    var meta = '<div class="meta-line"><span>bid ' + bidLine + '</span><span class="trk">tricks ' + tricks + '</span></div>';
    return '<div class="seat ' + (sideClass || '') + (turn ? ' turn' : '') + '">' + nameLine + meta + '</div>';
  }

  function trickSlotFor(targetRel) {
    var trick = STATE.currentTrick || [];
    for (var i = 0; i < trick.length; i++) {
      if (rel(trick[i].seat) === targetRel) return cardFaceHTML(trick[i].card, true);
    }
    return '';
  }

  function renderTopbar() {
    var us = usTeam(), them = 1 - us;
    var usScore = STATE.scores[us], themScore = STATE.scores[them];
    var usLead = usScore > themScore ? ' lead' : '';
    var themLead = themScore > usScore ? ' lead' : '';
    var tally =
      '<div class="tally">' +
        '<div class="t-line t-us"><span class="t-name">Us (Team ' + (us === 0 ? 'A' : 'B') + ')</span>' +
        '<span class="t-score' + usLead + '">' + usScore + '</span></div>' +
        '<div class="t-line"><span class="t-name">Them</span>' +
        '<span class="t-score' + themLead + '">' + themScore + '</span></div>' +
      '</div>';

    var trump;
    var burned = (STATE.burnedJokers && STATE.burnedJokers.length)
      ? '<span class="lab" style="color:var(--vermilion)">' +
        (STATE.burnedJokers.length === 2 ? 'both jokers burned' :
          (STATE.burnedJokers[0].joker === 'big' ? 'big joker burned' : 'lil joker burned')) + '</span>'
      : '';
    if (!STATE.trumpSuit) {
      trump = '<div class="trump-ind notrump"><span class="lab">Trump</span><span class="val">No-trump</span>' + burned + '</div>';
    } else {
      var red = (STATE.trumpSuit === 'H' || STATE.trumpSuit === 'D');
      var fc = STATE.flippedCard ? cardFaceHTMLFlip(STATE.flippedCard) : '';
      trump = '<div class="trump-ind">' + fc + '<div><span class="lab">Trump</span><br>' +
        '<span class="val' + (red ? ' red' : '') + '">' + E.SUIT_SYM[STATE.trumpSuit] + ' ' + E.SUIT_NAME[STATE.trumpSuit] + '</span>' +
        (burned ? '<br>' + burned : '') + '</div></div>';
    }
    var deal = '<div class="dealmeta"><div class="deal-num">Deal ' + (STATE.dealIndex + 1) + ' of ' + E.SEQ.length + ' &middot; ' + STATE.handSize + ' cards</div>' + trump + '</div>';

    var status = '';
    if (STATE.phase === 'bidding') {
      status = STATE.turnSeat === mySeat
        ? '<span class="turn">Your bid</span>'
        : 'Bidding: <span class="turn">' + esc(seatNameFor(STATE.turnSeat)) + '</span>';
    } else if (STATE.phase === 'playing') {
      if (STATE.awaitingTrickClear) {
        status = '<span class="turn">Trick complete</span>';
      } else {
        status = STATE.turnSeat === mySeat
          ? '<span class="turn">Your lead</span>'
          : 'To play: <span class="turn">' + esc(seatNameFor(STATE.turnSeat)) + '</span>';
        if (STATE.trumpSuit && !STATE.trumpBroken) status += '<br><span class="broken-flag">trump not broken</span>';
      }
    }
    return '<div class="topbar">' + tally + deal + '<div class="status-line">' + status + '</div></div>';
  }
  function cardFaceHTMLFlip(card) {
    if (card.joker) return '<span class="flip-card">&#9733;</span>';
    var red = (card.suit === 'H' || card.suit === 'D');
    return '<span class="flip-card' + (red ? ' red' : '') + '">' + E.rankLabel(card.rank) + E.SUIT_SYM[card.suit] + '</span>';
  }
  function seatNameFor(seat) {
    if (seat === mySeat) return 'you';
    var seats = currentSeats();
    return seats[seat] ? seats[seat].name : 'Seat ' + seat;
  }

  function renderTable() {
    if (!STATE) { render(); return; }
    if (STATE.phase === 'lobby') { renderLobby(); return; }
    return renderBabTable();
  }

  function renderBabTable() {
    maybeShuffleAnim();
    var topSeat = (mySeat + 2) % 4;
    var rightSeat = (mySeat + 1) % 4;
    var leftSeat = (mySeat + 3) % 4;

    var leadHint = '';
    if ((STATE.currentTrick || []).length === 0 && STATE.phase === 'playing') {
      leadHint = '<div class="lead-hint">lead</div>';
    }

    var felt =
      '<div class="felt">' +
        '<div class="seat-row top">' + seatPanel(topSeat) + '</div>' +
        '<div class="mid">' +
          '<div class="seat-wrap left">' + seatPanel(leftSeat, 'side') + '</div>' +
          '<div class="trick">' +
            '<div class="slot t-top">' + trickSlotFor(2) + '</div>' +
            '<div class="slot t-left">' + trickSlotFor(3) + '</div>' +
            '<div class="slot t-mid">' + leadHint + '</div>' +
            '<div class="slot t-right">' + trickSlotFor(1) + '</div>' +
            '<div class="slot t-bottom">' + trickSlotFor(0) + '</div>' +
          '</div>' +
          '<div class="seat-wrap right">' + seatPanel(rightSeat, 'side') + '</div>' +
        '</div>' +
        '<div class="seat-row bottom">' + seatPanel(mySeat) + '</div>' +
      '</div>';

    var leave = '<div class="spread" style="margin-bottom:10px"><div class="eyebrow">' +
      (MODE === 'onlineGame' ? 'Room ' + esc(roomCode || '') : 'Local match') + '</div>' +
      '<button class="btn btn-ghost btn-sm" data-act="home">Quit</button></div>';

    app.innerHTML = leave + renderTopbar() + felt + renderHand() + renderControls() + renderLog() + renderOverlay() + wastedFlash() + setFlash();
    var logEl = $('logList'); if (logEl) logEl.scrollTop = logEl.scrollHeight;
  }

  function renderHand() {
    var myHand = (STATE.hands && STATE.hands[mySeat]) ? STATE.hands[mySeat] : [];
    var myTurnPlay = STATE.phase === 'playing' && STATE.turnSeat === mySeat && !awaiting;
    var legalIds = {};
    if (myTurnPlay) {
      E.legalPlays(STATE, mySeat, STATE.strictMode).forEach(function (c) { legalIds[c.id] = true; });
    }
    var cards = myHand.map(function (c) {
      var playable = myTurnPlay && legalIds[c.id];
      var cls = 'card-btn' + (STATE.phase === 'playing' && STATE.turnSeat === mySeat ? (playable ? ' playable' : ' dimmed') : '');
      var attrs = playable ? ' data-act="play-card" data-card="' + c.id + '"' : '';
      return '<button class="' + cls + '"' + attrs + (playable ? '' : ' tabindex="-1"') + '>' + cardFaceHTML(c, false) + '</button>';
    }).join('');
    return '<div class="handbar"><div class="eyebrow">Your hand</div><div class="hand">' + (cards || '<span class="muted">empty</span>') + '</div></div>';
  }

  function renderControls() {
    if (awaiting && STATE.turnSeat === mySeat) {
      return '<div class="controls"><div class="prompt">Sent. <span class="accent">Waiting for the table...</span></div></div>';
    }
    if (STATE.phase === 'playing' && STATE.turnSeat === mySeat) {
      var tr = STATE.currentTrick || [];
      if (tr.length && tr[0].card.joker === 'big' && (tr[0].seat % 2) !== (mySeat % 2) &&
          (STATE.hands[mySeat] || []).some(function (c) { return E.isTrump(c, STATE.trumpSuit); })) {
        return '<div class="controls"><div class="prompt">Big Joker led. <span class="accent">Your highest trump is forced.</span></div></div>';
      }
      return '<div class="controls"><div class="prompt">Tap a highlighted card to play. <span class="accent">You must follow the led suit if you can.</span></div></div>';
    }
    if (!(STATE.phase === 'bidding' && STATE.turnSeat === mySeat)) return '';
    var hs = STATE.handSize;
    var btns = '<button class="btn" data-act="bid" data-bidtype="pass">Pass</button>';
    for (var n = 1; n <= hs; n++) {
      btns += '<button class="btn" data-act="bid" data-bidtype="num" data-bidval="' + n + '">' + n + '</button>';
    }
    var priorBoards = 0;
    if (STATE.bids) for (var bs = 0; bs < 4; bs++) { var bb = STATE.bids[bs]; if (bb && bb.type === 'board') priorBoards++; }
    var nextLevel = Math.min(priorBoards + 1, 4);
    var boardNames = { 1: 'Board', 2: 'Double Board', 3: 'Triple Board', 4: 'Quadruple Board' };
    btns += '<button class="btn btn-accent" data-act="bid" data-bidtype="board">' + boardNames[nextLevel] + '</button>';
    if (hs >= 6) btns += '<button class="btn btn-danger" data-act="bid" data-bidtype="boston">Boston</button>';
    var boardHint = priorBoards > 0 ? boardNames[nextLevel] : 'Board';
    return '<div class="controls"><div class="prompt">Your bid <span class="accent">(0 to ' + hs + ' tricks, or ' + boardHint + ' / ' + (hs >= 6 ? 'Boston' : 'no Boston this hand') + ')</span></div><div class="bid-grid">' + btns + '</div></div>';
  }

  function renderLog() {
    var lines = (STATE.log || []).slice(-14).map(function (m) { return '<li>' + esc(m) + '</li>'; }).join('');
    return '<div class="logbox"><div class="eyebrow">Table log</div><ul class="log" id="logList">' + lines + '</ul></div>';
  }

  // ----------------------------------------------------------- overlays
  var lastDealSeen = -1;
  function flashShuffle() {
    var el = document.createElement('div');
    el.className = 'shuffle-overlay';
    el.innerHTML = '<div class="shuffle-stack"><div class="sc"></div><div class="sc"></div><div class="sc"></div><div class="sc"></div><div class="shuffle-label">Shuffling</div></div>';
    document.body.appendChild(el);
    setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 1500);
  }
  function maybeShuffleAnim() {
    if (!STATE) return;
    var di = (typeof STATE.dealIndex === 'number') ? STATE.dealIndex : -1;
    if (lastDealSeen >= 0 && di > lastDealSeen && STATE.phase !== 'finished') flashShuffle();
    lastDealSeen = di;
  }
  var lastWastedTs = 0;
  function wastedFlash() {
    var w = STATE.wastedIt;
    if (!w) return '';
    if (w.ts === lastWastedTs) return '';
    lastWastedTs = w.ts;
    var who = (w.seat === mySeat) ? 'You' : esc(w.name);
    var el = document.createElement('div');
    el.className = 'wasted-flash';
    el.innerHTML = '<div class="wasted-clown">&#129313;</div>' +
      '<div class="wasted-word">WASTED IT!</div>' +
      '<div class="wasted-sub">' + who + ' threw the Big Joker away</div>';
    document.body.appendChild(el);
    setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 5200);
    return '';
  }
  var lastSetDealShown = -1;
  function setFlash() {
    if (STATE.phase !== 'handScored' || !STATE.lastHandResult) return '';
    var di = (typeof STATE.dealIndex === 'number') ? STATE.dealIndex : -1;
    if (di === lastSetDealShown) return '';
    var r = STATE.lastHandResult;
    var setTeams = [];
    if (r.teams[0] && r.teams[0].delta < 0) setTeams.push('A');
    if (r.teams[1] && r.teams[1].delta < 0) setTeams.push('B');
    if (!setTeams.length) { lastSetDealShown = di; return ''; }
    lastSetDealShown = di;
    var label = setTeams.length === 2 ? 'BOTH TEAMS WENT SET!' : ('TEAM ' + setTeams[0] + ' WENT SET!');
    var faces = '';
    for (var i = 0; i < 14; i++) {
      var pick = (i % 2 === 0) ? '&#128514;' : '&#128517;';
      faces += '<span class="set-face f' + (i % 7) + '">' + pick + '</span>';
    }
    var points = '';
    for (var j = 0; j < 8; j++) points += '<span class="set-point p' + (j % 4) + '">&#128072;</span>';
    var el = document.createElement('div');
    el.className = 'set-flash';
    el.innerHTML = '<div class="set-faces">' + faces + '</div>' +
      '<div class="set-points">' + points + '</div>' +
      '<div class="set-word">' + label + '</div>' +
      '<div class="set-sub">HA HA HA HA HA</div>';
    document.body.appendChild(el);
    setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 10000);
    return '';
  }
  function renderOverlay() {
    if (STATE.phase === 'handScored' && STATE.lastHandResult) return handResultOverlay();
    if (STATE.phase === 'finished') return gameOverOverlay();
    return '';
  }
  function deltaSpan(d) {
    return '<span class="delta ' + (d >= 0 ? 'pos' : 'neg') + '">' + (d >= 0 ? '+' : '') + d + '</span>';
  }
  function handResultOverlay() {
    var r = STATE.lastHandResult, us = usTeam(), them = 1 - us;
    function rowFor(t, label, isUs) {
      var tr = r.teams[t];
      return '<div class="result-row"><div class="who' + (isUs ? ' us' : '') + '">' + label +
        '<span class="detail">' + esc(tr.line) + '</span></div>' + deltaSpan(tr.delta) + '</div>';
    }
    var canAdvance = (MODE === 'localGame') || isHost;
    var advance = canAdvance
      ? '<button class="btn-accent btn" data-act="next-hand">Next hand</button>'
      : '<span class="waiting">Waiting for the host to deal the next hand.</span>';
    return '<div class="overlay"><div class="sheet">' +
      '<div class="eyebrow">Hand ' + (STATE.dealIndex + 1) + ' scored</div>' +
      '<h2>The reckoning</h2>' +
      rowFor(us, 'Us', true) + rowFor(them, 'Them', false) +
      '<div class="totals"><span>Running total</span><span>Us ' + STATE.scores[us] + ' &middot; Them ' + STATE.scores[them] + '</span></div>' +
      '<div class="actions">' + advance + '</div>' +
      '</div></div>';
  }
  function gameOverOverlay() {
    var us = usTeam(), them = 1 - us;
    var u = STATE.scores[us], t = STATE.scores[them];
    var head = u > t ? '<span class="gg-win">Us wins</span>' : (t > u ? '<span class="gg-lose">Them wins</span>' : 'Dead heat');
    var again = (MODE === 'localGame')
      ? '<button class="btn-accent btn" data-act="play-again">Next match</button>'
      : '<button class="btn-accent btn" data-act="home">Back to start</button>';
    return '<div class="overlay"><div class="sheet">' +
      '<div class="eyebrow">25 deals complete</div>' +
      '<h2>' + head + '</h2>' +
      '<div class="result-row"><div class="who us">Us</div><span class="delta">' + u + '</span></div>' +
      '<div class="result-row"><div class="who">Them</div><span class="delta">' + t + '</span></div>' +
      '<div class="actions"><button class="btn btn-ghost" data-act="home">Home</button>' + again + '</div>' +
      '</div></div>';
  }

  // ----------------------------------------------------------- local runner
  function startLocal() {
    var nm = val('nameInput'); if (nm) myName = nm;
    var strict = $('strictModeInput');
    if (strict) strictMode = strict.value === 'true';
    MODE = 'localGame'; mySeat = 0;
    var seats = {}; seats[0] = { name: myName || 'You', isBot: false, playerId: 'you' };
    var G = eng();
    STATE = G.newLobbyState(seats);
    STATE = G.reduce(STATE, { type: 'startGame' });
    STATE.strictMode = strictMode; // strict mode drives renege detection
    render();
    scheduleLocal();
  }
  function dispatchLocal(action) {
    STATE = eng().reduce(STATE, action);
    render();
    scheduleLocal();
  }
  function scheduleLocal() {
    if (localTimer) { clearTimeout(localTimer); localTimer = null; }
    if (!STATE) return;
    if (STATE.phase === 'playing' && STATE.awaitingTrickClear) {
      localTimer = setTimeout(function () { dispatchLocal({ type: 'clearTrick' }); }, TRICK_HOLD);
    } else if ((STATE.phase === 'bidding' || STATE.phase === 'playing') && isBotSeat(STATE.turnSeat)) {
      var delay = STATE.phase === 'bidding' ? BID_DELAY : PLAY_DELAY;
      localTimer = setTimeout(function () { var a = E.botAction(STATE, botDifficulty); if (a) dispatchLocal(a); }, delay);
    } else if (STATE.phase === 'handScored') {
      localTimer = setTimeout(function () { dispatchLocal({ type: 'nextHand' }); }, NEXT_DELAY);
    }
  }
  function playAgainLocal() { startLocal(); }

  // ----------------------------------------------------------- online runner
  function goOnline() {
    var nm = val('nameInput'); if (nm) myName = nm;
    if (!window.firebase) { render(); return; }
    if (!(FB && FB.databaseURL)) { renderFbSetup(); return; }
    MODE = 'onlineLobby'; room = null; roomCode = null;
    app.innerHTML =
      '<div class="spread" style="margin-bottom:10px"><div class="eyebrow">Online</div>' +
      '<button class="btn btn-ghost btn-sm" data-act="home">Back</button></div>' +
      '<div class="card-panel" style="max-width:460px;margin:0 auto">' +
        '<div class="field"><label for="nameInput2">Your name</label>' +
        '<input id="nameInput2" type="text" maxlength="18" value="' + esc(myName === 'You' ? '' : myName) + '" placeholder="Your name"></div>' +
        '<hr class="divider">' +
        '<button class="btn-accent btn" style="width:100%" data-act="create-room">Create a room</button>' +
        '<div class="note">You become the host. Share the invite link that appears. Players need no account.</div>' +
        '<hr class="divider">' +
        '<div class="field"><label for="codeInput">Join with a code</label>' +
        '<input id="codeInput" type="text" maxlength="4" autocapitalize="characters" autocomplete="off" placeholder="ABCD" value="' + esc(lastRoom()) + '"></div>' +
        '<button class="btn" style="width:100%" data-act="join-room">Join room</button>' +
        '<div id="onlineErr" class="note warn-note"></div>' +
      '</div>';
  }

  // One-time host setup: paste the firebaseConfig snippet from the Firebase
  // console. Guests never see this screen because invite links carry the config.
  function renderFbSetup() {
    MODE = 'home';
    app.innerHTML =
      '<div class="spread" style="margin-bottom:10px"><div class="eyebrow">Online setup</div>' +
      '<button class="btn btn-ghost btn-sm" data-act="home">Back</button></div>' +
      '<div class="card-panel" style="max-width:520px;margin:0 auto">' +
        '<div class="eyebrow">One time, host only</div>' +
        '<p class="muted" style="margin:8px 0 4px">If someone sent you an invite link, you do not need this. Just open their link.</p>' +
        '<p class="muted" style="margin:4px 0 10px">Hosting for the first time: in the Firebase console open Project settings, Your apps, and copy the whole <span style="color:var(--brass)">firebaseConfig</span> block. Paste it below exactly as copied.</p>' +
        '<div class="field"><label for="fbConfigInput">Paste firebaseConfig here</label>' +
        '<textarea id="fbConfigInput" rows="8" style="width:100%;background:#11150f;color:var(--bone);border:1px solid var(--line);border-radius:4px;padding:10px;font-family:monospace;font-size:13px" placeholder=\'const firebaseConfig = {\n  apiKey: "...",\n  databaseURL: "https://...firebaseio.com",\n  ...\n};\'></textarea></div>' +
        '<button class="btn-accent btn" style="width:100%" data-act="save-fb">Save and continue</button>' +
        '<div id="fbErr" class="note warn-note"></div>' +
      '</div>';
  }
  function saveFbConfig() {
    var raw = ($('fbConfigInput') && $('fbConfigInput').value) || '';
    var cfg = null;
    try { cfg = JSON.parse(raw); } catch (e) { cfg = null; }
    if (!cfg) {
      cfg = {};
      var m, re = /(\w+)\s*:\s*["']([^"']*)["']/g;
      while ((m = re.exec(raw)) !== null) cfg[m[1]] = m[2];
    }
    if (!cfg.databaseURL || !/^https:\/\//.test(cfg.databaseURL)) {
      var e2 = $('fbErr');
      if (e2) e2.textContent = 'No databaseURL found. In Firebase, create a Realtime Database first, then re-copy the config (it must include databaseURL).';
      return;
    }
    FB = cfg;
    persistFb(cfg);
    // Show a setup link the user can bookmark so they never have to paste again.
    var setupLink = location.origin + location.pathname + '#fb=' + encodeURIComponent(b64enc(JSON.stringify(cfg)));
    MODE = 'home';
    app.innerHTML =
      '<div class="spread" style="margin-bottom:10px"><div class="eyebrow">Setup complete</div>' +
      '<button class="btn btn-ghost btn-sm" data-act="home">Home</button></div>' +
      '<div class="card-panel" style="max-width:520px;margin:0 auto">' +
        '<h2>Firebase config saved</h2>' +
        '<p class="muted" style="margin:8px 0">Bookmark or save this link. Next time you open it, you\'ll be instantly ready to host without pasting the config again:</p>' +
        '<div style="background:#11150f;border:1px solid var(--line);border-radius:4px;padding:10px;margin:10px 0;word-break:break-all;font-size:12px;color:var(--bone);font-family:monospace">' +
          '<a href="' + setupLink + '" style="color:var(--brass);text-decoration:none">' + esc(setupLink) + '</a>' +
        '</div>' +
        '<div class="row" style="gap:8px">' +
          '<button class="btn" style="flex:1" data-act="copy-setup-link">Copy link</button>' +
          (navigator.share ? '<button class="btn-accent" style="flex:1" data-act="share-setup-link">Share link</button>' : '') +
        '</div>' +
        '<hr class="divider">' +
        '<button class="btn-accent btn" style="width:100%;margin-top:8px" data-act="continue-hosting">Continue to hosting</button>' +
      '</div>';
  }
  function copySetupLink() {
    var setupLink = location.origin + location.pathname + '#fb=' + encodeURIComponent(b64enc(JSON.stringify(FB)));
    if (navigator.clipboard) navigator.clipboard.writeText(setupLink).catch(function () {});
    var b = document.querySelector('[data-act="copy-setup-link"]');
    if (b) { var t = b.textContent; b.textContent = 'Copied'; setTimeout(function () { b.textContent = t; }, 1200); }
  }
  function shareSetupLink() {
    var setupLink = location.origin + location.pathname + '#fb=' + encodeURIComponent(b64enc(JSON.stringify(FB)));
    if (!navigator.share) return copySetupLink();
    navigator.share({
      title: 'Back Alley Bridge Setup Link',
      text: 'Use this link to host Back Alley Bridge. Your Firebase config is embedded so you never need to paste it again.',
      url: setupLink
    }).catch(function () {});
  }
  function continueHosting() {
    goOnline();
  }
  function readName2() { var v = val('nameInput2'); if (v) myName = v; }
  function showOnlineErr(msg) { var e = $('onlineErr'); if (e) e.textContent = msg; }

  function roomPhase() {
    if (!STATE) return 'lobby';
    return STATE.phase === 'finished' ? 'finished' : (STATE.phase === 'lobby' ? 'lobby' : 'playing');
  }
  function seatsToArray() {
    var seats = (STATE && MODE === 'onlineGame') ? STATE.seats : arrayToSeats(room ? room.seats : []);
    var a = []; for (var i = 0; i < 4; i++) a.push((seats && seats[i]) || null);
    return a;
  }
  function arrayToSeats(arr) {
    var o = {}; for (var i = 0; i < 4; i++) if (arr && arr[i]) o[i] = arr[i]; return o;
  }

  // Host writes the whole authoritative room doc as one JSON string; every guest
  // is subscribed to it and re-renders the instant it changes.
  function writeRoom() {
    if (!roomCode || !db) return;
    room = room || {};
    room.host = { id: myId, beat: Date.now() };
    room.phase = roomPhase();
    room.game = GAME;
    room.seats = seatsToArray();
    room.gameJSON = (STATE && MODE === 'onlineGame') ? JSON.stringify(STATE) : null;
    room.ver = (room.ver || 0) + 1;
    lastVer = room.ver;
    return docRef().set(JSON.stringify(room));
  }

  function findFreeCode(attemptsLeft, cb) {
    var code = genCode();
    db.ref('rooms/' + ROOM_NS + '/' + code + '/doc').once('value').then(function (snap) {
      var raw = snap.val();
      if (!raw) return cb(code);
      var r = safeParse(raw);
      var stale = !r || !r.host || (Date.now() - (r.host.beat || 0) > HOST_STALE * 2);
      if (stale || attemptsLeft <= 0) return cb(code);
      findFreeCode(attemptsLeft - 1, cb);
    }).catch(function () { cb(code); });
  }
  function createRoom() {
    readName2();
    ensureFirebase().then(function (ok) {
      if (!ok) { showOnlineErr('Online is not configured yet. Add your Firebase databaseURL near the top of this file.'); return; }
      findFreeCode(5, function (code) {
        roomCode = code;
        isHost = true; mySeat = 0; roomLive = false; STATE = null;
        room = {
          host: { id: myId, beat: Date.now() }, phase: 'lobby', game: GAME,
          seats: [{ name: myName || 'Host', isBot: false, playerId: myId }, null, null, null],
          gameJSON: null, ver: 0
        };
        rememberRoom(roomCode);
        db.ref(roomPath()).remove().catch(function () {});
        addPresence();
        writeRoom();
        startHostDuties();
        MODE = 'onlineLobby'; roomLive = true;
        render();
      });
    });
  }

  function joinRoom() {
    readName2();
    var code = (val('codeInput') || '').toUpperCase().replace(/[^A-Z]/g, '');
    if (code.length !== 4) { showOnlineErr('Enter the four-letter room code.'); return; }
    showOnlineErr('Connecting to room ' + code + '...');
    ensureFirebase().then(function (ok) {
      if (!ok) { showOnlineErr('Online is not configured yet. Add your Firebase databaseURL near the top of this file.'); return; }
      roomCode = code;
      docRef().once('value').then(function (snap) {
        var raw = snap.val();
        if (!raw) { showOnlineErr('No open room with code ' + code + '. Check the code, or ask the host to create the room first.'); roomCode = null; return; }
        var r = safeParse(raw);
        if (!r) { showOnlineErr('That room looks corrupted. Ask the host to make a new one.'); roomCode = null; return; }
        if (r.phase && r.phase !== 'lobby') {
          var g = r.gameJSON ? safeParse(r.gameJSON) : null;
          var held = -1, botSeat = -1;
          if (g && g.seats) for (var i = 0; i < 4; i++) {
            var st = g.seats[i];
            if (st && st.playerId === myId) held = i;
            if (st && st.isBot && botSeat < 0) botSeat = i;
          }
          if (held < 0 && botSeat < 0) {
            showOnlineErr('That game is full and in progress. Ask them to finish the hand, or try again when a seat opens.');
            roomCode = null; return;
          }
        }
        isHost = false; room = r; lastVer = -1;
        GAME = (r.game && GAME_META[r.game]) ? r.game : 'bab';
        rememberRoom(code);
        addPresence();
        attachRoomListener();
        MODE = (r.phase && r.phase !== 'lobby') ? 'onlineGame' : 'onlineLobby';
        mySeat = computeMySeat(); if (mySeat < 0) mySeat = 0;
        render();
      }).catch(function () {
        showOnlineErr('Could not reach the game database. Check the Firebase setup and your connection.');
        roomCode = null;
      });
    });
  }

  // ---- host duties: assign seats from presence, apply incoming moves, heartbeat ----
  function startHostDuties() {
    if (hostBeatTimer) clearInterval(hostBeatTimer);
    var pRef = db.ref(roomPath() + '/players');
    var onPlayers = pRef.on('value', function (snap) {
      if (!isHost) return;
      var players = [];
      snap.forEach(function (c) { var p = c.val(); if (p) players.push(p); });
      players.sort(function (a, b) { return a.ts - b.ts; });
      if (roomPhase() === 'lobby') {
        var arr = [{ name: myName || 'Host', isBot: false, playerId: myId }, null, null, null];
        var others = players.filter(function (p) { return p.id !== myId; });
        var slot = 1;
        for (var i = 0; i < others.length && slot < 4; i++) {
          arr[slot++] = { name: others[i].name || 'Player', isBot: false, playerId: others[i].id };
        }
        if (JSON.stringify(arr) !== JSON.stringify((room && room.seats) || [])) {
          room = room || {}; room.seats = arr; writeRoom();
          if (MODE === 'onlineLobby') render();
        }
      } else if (STATE && STATE.seats) {
        reconcileSeatsInGame(players);
      }
    });
    listeners.push({ ref: pRef, ev: 'value', cb: onPlayers });

    var mRef = db.ref(roomPath() + '/moves');
    var onMove = function (snap) {
      if (!isHost || !STATE) return;
      var seat = parseInt(snap.key, 10);
      var mv = snap.val();
      db.ref(roomPath() + '/moves/' + snap.key).remove();
      if (!mv || !mv.action) return;
      var act = mv.action;
      if (act.type === 'nextRound' || act.type === 'nextHand') { applyHost(act); return; }
      if (act.seat === seat && STATE.turnSeat === seat) applyHost(act);
    };
    var a1 = mRef.on('child_added', onMove);
    var a2 = mRef.on('child_changed', onMove);
    listeners.push({ ref: mRef, ev: 'child_added', cb: a1 });
    listeners.push({ ref: mRef, ev: 'child_changed', cb: a2 });

    hostBeatTimer = setInterval(function () {
      if (isHost && db) {
        db.ref(roomPath() + '/host').set({ id: myId, beat: Date.now() });
        if (STATE && STATE.seats && roomPhase() !== 'lobby') {
          db.ref(roomPath() + '/players').once('value').then(function (snap) {
            var players = []; snap.forEach(function (c) { var p = c.val(); if (p) players.push(p); });
            reconcileSeatsInGame(players);
          });
        }
      }
    }, BEAT_EVERY);
  }

  var PRESENCE_STALE = 12000;
  function reconcileSeatsInGame(players) {
    if (!isHost || !STATE || !STATE.seats) return;
    var now = Date.now();
    var presentById = {};
    players.forEach(function (p) { if (p && p.id && (now - (p.ts || 0) < PRESENCE_STALE)) presentById[p.id] = p; });
    presentById[myId] = presentById[myId] || { id: myId, name: myName || 'Host', ts: now };
    var changed = false;
    var botPool = pickBotNames(BOT_NAMES.length);
    var bpi = 0;
    var presentByName = {};
    Object.keys(presentById).forEach(function (pid) {
      var p = presentById[pid];
      if (p && p.name) presentByName[String(p.name).toLowerCase()] = p;
    });

    // 1) Restore present players first, matching by id then remembered name.
    var seatedIds = {};
    for (var s0 = 0; s0 < 4; s0++) { var s0s = STATE.seats[s0]; if (s0s && !s0s.isBot && s0s.playerId) seatedIds[s0s.playerId] = true; }
    Object.keys(presentById).forEach(function (pid) {
      if (seatedIds[pid]) return;
      var p = presentById[pid];
      var target = -1;
      for (var i = 0; i < 4; i++) { var ss = STATE.seats[i]; if (ss && ss.isBot && ss.playerId === pid) { target = i; break; } }
      if (target < 0) for (var k = 0; k < 4; k++) {
        var sk = STATE.seats[k];
        if (sk && sk.isBot && sk.wasHuman && sk.humanName &&
            String(sk.humanName).toLowerCase() === String(p.name || '').toLowerCase()) { target = k; break; }
      }
      if (target < 0) for (var j = 0; j < 4; j++) { var sj = STATE.seats[j]; if (sj && sj.isBot) { target = j; break; } }
      if (target >= 0) {
        STATE.seats[target] = { name: p.name || 'Player', isBot: false, playerId: pid };
        seatedIds[pid] = true; changed = true;
      }
    });

    // 2) Convert genuinely-absent humans (no id and no name present) to bots.
    for (var s = 0; s < 4; s++) {
      var seat = STATE.seats[s];
      if (seat && !seat.isBot && seat.playerId) {
        var here = !!presentById[seat.playerId] ||
                   !!(seat.name && presentByName[String(seat.name).toLowerCase()]);
        if (!here) {
          seat.isBot = true; seat.wasHuman = true; seat.humanName = seat.name;
          seat.name = (botPool[bpi++] || 'Bot') + ' (bot)';
          changed = true;
        }
      }
    }

    if (changed) {
      if (hostTimer && !isBotSeat(STATE.turnSeat)) { clearTimeout(hostTimer); hostTimer = null; }
      writeRoom(); render(); scheduleHostFollowup();
    }
  }

  function applyHost(action) {
    STATE = eng().reduce(STATE, action);
    writeRoom();
    scheduleHostFollowup();
    render();
  }
  function scheduleHostFollowup() {
    if (hostTimer) { clearTimeout(hostTimer); hostTimer = null; }
    if (!isHost || !STATE) return;
    if (STATE.phase === 'playing' && STATE.awaitingTrickClear) {
      hostTimer = setTimeout(function () { if (isHost) applyHost({ type: 'clearTrick' }); }, TRICK_HOLD);
    } else if ((STATE.phase === 'bidding' || STATE.phase === 'playing') && isBotSeat(STATE.turnSeat)) {
      var d = STATE.phase === 'bidding' ? BID_DELAY : PLAY_DELAY;
      hostTimer = setTimeout(function () {
        if (!isHost) return;
        if (!isBotSeat(STATE.turnSeat)) return; // seat may have flipped to a returning human
        var a = E.botAction(STATE, botDifficulty); if (a) applyHost(a);
      }, d);
    } else if (STATE.phase === 'handScored') {
      hostTimer = setTimeout(function () { if (isHost) applyHost({ type: 'nextHand' }); }, NEXT_DELAY);
    }
  }

  function startGameOnline() {
    if (!isHost) return;
    var seatsObj = arrayToSeats(room.seats);
    var G = eng();
    STATE = G.newLobbyState(seatsObj);
    STATE = G.reduce(STATE, { type: 'startGame' });
    // Guarantee every seat carries a display name (bots included), distinct from
    // any human name already seated.
    var takenNm = {};
    for (var tt = 0; tt < 4; tt++) { var exx = STATE.seats[tt]; if (exx && exx.name) takenNm[exx.name] = true; }
    var poolNm = pickBotNames(BOT_NAMES.length).filter(function (n) { return !takenNm[n]; });
    var pmi = 0;
    for (var s = 0; s < 4; s++) {
      if (!STATE.seats[s]) { var nmx = poolNm[pmi++] || ('Bot ' + (s + 1)); takenNm[nmx] = true; STATE.seats[s] = { name: nmx, isBot: true, playerId: 'bot' + s }; }
      else if (!STATE.seats[s].name) STATE.seats[s].name = STATE.seats[s].isBot ? (poolNm[pmi++] || ('Bot ' + (s + 1))) : ('Seat ' + s);
    }
    STATE.strictMode = strictMode;
    MODE = 'onlineGame';
    mySeat = computeMySeat(); if (mySeat < 0) mySeat = 0;
    writeRoom();
    scheduleHostFollowup();
    render();
  }

  // ---- guest: subscribe to the room doc; adopt host if the host drops ----
  function attachRoomListener() {
    detachListeners();
    var rref = db.ref(roomPath());
    var cb = rref.on('value', function (snap) {
      var v = snap.val() || {};
      if (isHost) return; // host is authoritative; ignore echoes of its own writes
      var hostNode = v.host || {};
      var r = v.doc ? safeParse(v.doc) : null;
      if (r) {
        room = r;
        GAME = (r.game && GAME_META[r.game]) ? r.game : 'bab';
        if (r.ver !== lastVer) {
          lastVer = r.ver; awaiting = false;
          if (r.phase === 'lobby') { MODE = 'onlineLobby'; STATE = null; }
          else if (r.gameJSON) { STATE = safeParse(r.gameJSON); MODE = 'onlineGame'; }
          mySeat = computeMySeat(); if (mySeat < 0) mySeat = 0;
          render();
        }
      }
      var beat = hostNode.beat || (r && r.host && r.host.beat) || 0;
      var hostId = hostNode.id || (r && r.host && r.host.id);
      if ((Date.now() - beat) > HOST_STALE && amLowestHuman(hostId)) becomeHost();
    });
    listeners.push({ ref: rref, ev: 'value', cb: cb });
  }
  function amLowestHuman(deadHostId) {
    var arr = seatsToArray();
    for (var i = 0; i < 4; i++) {
      var s = arr[i];
      if (s && !s.isBot && s.playerId && s.playerId !== deadHostId) return s.playerId === myId;
    }
    return false;
  }
  function becomeHost() {
    if (isHost) return;
    isHost = true;
    detachListeners();
    if (room && room.gameJSON && !STATE) STATE = safeParse(room.gameJSON);
    mySeat = computeMySeat(); if (mySeat < 0) mySeat = 0;
    db.ref(roomPath() + '/host').set({ id: myId, beat: Date.now() });
    writeRoom();
    startHostDuties();
    scheduleHostFollowup();
    render();
  }

  function submitOnline(action) {
    if (isHost) { applyHost(action); return; }
    if (!db) return;
    awaiting = true;
    db.ref(roomPath() + '/moves/' + mySeat).set({ action: action, ts: Date.now() });
    render();
  }

  // ----------------------------------------------------------- teardown
  function leaveToHome() {
    if (localTimer) { clearTimeout(localTimer); localTimer = null; }
    if (hostTimer) { clearTimeout(hostTimer); hostTimer = null; }
    if (hostBeatTimer) { clearInterval(hostBeatTimer); hostBeatTimer = null; }
    stopPresence();
    stopChat();
    detachListeners();
    if (roomCode && db && myId) db.ref(roomPath() + '/players/' + myId).remove().catch(function () {});
    roomCode = null; isHost = false; room = null; roomLive = false; lastVer = -1; awaiting = false;
    STATE = null; MODE = 'home'; mySeat = 0;
    render();
  }

  // ----------------------------------------------------------- share helpers
  function copyCode() {
    if (!roomCode) return;
    if (navigator.clipboard) navigator.clipboard.writeText(roomCode).catch(function () {});
    var b = document.querySelector('[data-act="copy-code"]');
    if (b) { var t = b.textContent; b.textContent = 'Copied'; setTimeout(function () { b.textContent = t; }, 1200); }
  }
  // The invite link carries the Firebase config and the room code in the hash,
  // so a family member who taps it lands fully configured with the code prefilled.
  function inviteURL() {
    var base = location.origin + location.pathname;
    var fb = b64enc(JSON.stringify(FB));
    return base + '#fb=' + encodeURIComponent(fb) + (roomCode ? '&room=' + roomCode : '');
  }
  function copyInvite() {
    if (navigator.clipboard) navigator.clipboard.writeText(inviteURL()).catch(function () {});
    var b = document.querySelector('[data-act="copy-invite"]');
    if (b) { var t = b.textContent; b.textContent = 'Copied'; setTimeout(function () { b.textContent = t; }, 1200); }
  }
  function shareRoom() {
    if (!navigator.share) return copyInvite();
    navigator.share({
      title: 'Back Alley Bridge',
      text: 'Join my Back Alley Bridge game. Tap the link, then Play online. Room code: ' + roomCode,
      url: inviteURL()
    }).catch(function () {});
  }

  // ----------------------------------------------------------- click routing
  document.addEventListener('click', function (e) {
    var c = e.target.closest('[data-chat]');
    if (!c) return;
    var action = c.getAttribute('data-chat');
    if (action === 'open') { chatOpen = true; chatUnread = 0; renderChat(); }
    else if (action === 'close') { chatOpen = false; renderChat(); }
    else if (action === 'send') {
      var input = document.getElementById('chatInput');
      if (input) { sendChat(input.value); input.value = ''; input.focus(); }
    }
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.target && e.target.id === 'chatInput') {
      e.preventDefault();
      sendChat(e.target.value); e.target.value = '';
    }
  });

  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-act]');
    if (!el) return;
    var act = el.getAttribute('data-act');
    switch (act) {
      case 'local-start': startLocal(); break;
      case 'go-online': goOnline(); break;
      case 'create-room': createRoom(); break;
      case 'join-room': joinRoom(); break;
      case 'start-game': startGameOnline(); break;
      case 'copy-code': copyCode(); break;
      case 'copy-invite': copyInvite(); break;
      case 'save-fb': saveFbConfig(); break;
      case 'copy-setup-link': copySetupLink(); break;
      case 'share-setup-link': shareSetupLink(); break;
      case 'continue-hosting': continueHosting(); break;
      case 'share-room': shareRoom(); break;
      case 'home': leaveToHome(); break;
      case 'play-again': playAgainLocal(); break;
      case 'next-hand':
        if (MODE === 'localGame') dispatchLocal({ type: 'nextHand' });
        else submitOnline({ type: 'nextHand' });
        break;
      case 'play-card': {
        var cid = el.getAttribute('data-card');
        var a1 = { type: 'play', seat: mySeat, cardId: cid };
        if (MODE === 'localGame') dispatchLocal(a1); else submitOnline(a1);
        break;
      }
      case 'bid': {
        var bt = el.getAttribute('data-bidtype');
        var bid = { type: bt };
        if (bt === 'num') bid.value = parseInt(el.getAttribute('data-bidval'), 10);
        var a2 = { type: 'bid', seat: mySeat, bid: bid };
        if (MODE === 'localGame') dispatchLocal(a2); else submitOnline(a2);
        break;
      }
    }
  });

  document.addEventListener('input', function (e) {
    if (e.target && (e.target.id === 'nameInput' || e.target.id === 'nameInput2')) {
      var v = e.target.value.trim(); if (v) myName = v;
    }
  });

  var savedIdentity = loadIdentity();
  initFromHashAndSaved(savedIdentity);
  render();
})();

  
  </script>
</body>
</html>

  function roomPhase() {
    if (!STATE) return 'lobby';
    return STATE.phase === 'finished' ? 'finished' : (STATE.phase === 'lobby' ? 'lobby' : 'playing');
  }
  function seatsToArray() {
    var seats = (STATE && MODE === 'onlineGame') ? STATE.seats : arrayToSeats(room ? room.seats : []);
    var a = []; for (var i = 0; i < 4; i++) a.push((seats && seats[i]) || null);
    return a;
  }
  function arrayToSeats(arr) {
    var o = {}; for (var i = 0; i < 4; i++) if (arr && arr[i]) o[i] = arr[i]; return o;
  }

  // Host writes the whole authoritative room doc as one JSON string; every guest
  // is subscribed to it and re-renders the instant it changes.
  function writeRoom() {
    if (!roomCode || !db) return;
    room = room || {};
    room.host = { id: myId, beat: Date.now() };
    room.phase = roomPhase();
    room.game = GAME;
    room.seats = seatsToArray();
    room.gameJSON = (STATE && MODE === 'onlineGame') ? JSON.stringify(STATE) : null;
    room.ver = (room.ver || 0) + 1;
    lastVer = room.ver;
    return docRef().set(JSON.stringify(room));
  }

  function createRoom() {
    readName2();
    ensureFirebase().then(function (ok) {
      if (!ok) { showOnlineErr('Online is not configured yet. Add your Firebase databaseURL near the top of this file.'); return; }
      roomCode = genCode();
      isHost = true; mySeat = 0; roomLive = false; STATE = null;
      room = {
        host: { id: myId, beat: Date.now() }, phase: 'lobby', game: GAME,
        seats: [{ name: myName || 'Host', isBot: false, playerId: myId }, null, null, null],
        gameJSON: null, ver: 0
      };
      rememberRoom(roomCode);
      db.ref(roomPath()).remove().catch(function () {});
      addPresence();
      writeRoom();
      startHostDuties();
      MODE = 'onlineLobby'; roomLive = true;
      render();
    });
  }

  function joinRoom() {
    readName2();
    var code = (val('codeInput') || '').toUpperCase().replace(/[^A-Z]/g, '');
    if (code.length !== 4) { showOnlineErr('Enter the four-letter room code.'); return; }
    showOnlineErr('Connecting to room ' + code + '...');
    ensureFirebase().then(function (ok) {
      if (!ok) { showOnlineErr('Online is not configured yet. Add your Firebase databaseURL near the top of this file.'); return; }
      roomCode = code;
      docRef().once('value').then(function (snap) {
        var raw = snap.val();
        if (!raw) { showOnlineErr('No open room with code ' + code + '. Check the code, or ask the host to create the room first.'); roomCode = null; return; }
        var r = safeParse(raw);
        if (!r) { showOnlineErr('That room looks corrupted. Ask the host to make a new one.'); roomCode = null; return; }
        if (r.phase && r.phase !== 'lobby') {
          var g = r.gameJSON ? safeParse(r.gameJSON) : null;
          var held = -1;
          if (g && g.seats) for (var i = 0; i < 4; i++) if (g.seats[i] && g.seats[i].playerId === myId) held = i;
          if (held < 0) { showOnlineErr('That game is already in progress.'); roomCode = null; return; }
        }
        isHost = false; room = r; lastVer = -1;
        GAME = (r.game && GAME_META[r.game]) ? r.game : 'bab';
        rememberRoom(code);
        addPresence();
        attachRoomListener();
        MODE = 'onlineLobby';
        mySeat = computeMySeat(); if (mySeat < 0) mySeat = 0;
        render();
      }).catch(function () {
        showOnlineErr('Could not reach the game database. Check the Firebase setup and your connection.');
        roomCode = null;
      });
    });
  }

  // ---- host duties: assign seats from presence, apply incoming moves, heartbeat ----
  function startHostDuties() {
    if (hostBeatTimer) clearInterval(hostBeatTimer);
    var pRef = db.ref(roomPath() + '/players');
    var onPlayers = pRef.on('value', function (snap) {
      if (!isHost || roomPhase() !== 'lobby') return;
      var players = [];
      snap.forEach(function (c) { var p = c.val(); if (p) players.push(p); });
      players.sort(function (a, b) { return a.ts - b.ts; });
      var arr = [{ name: myName || 'Host', isBot: false, playerId: myId }, null, null, null];
      var others = players.filter(function (p) { return p.id !== myId; });
      var slot = 1;
      for (var i = 0; i < others.length && slot < 4; i++) {
        arr[slot++] = { name: others[i].name || 'Player', isBot: false, playerId: others[i].id };
      }
      if (JSON.stringify(arr) !== JSON.stringify((room && room.seats) || [])) {
        room = room || {}; room.seats = arr; writeRoom();
        if (MODE === 'onlineLobby') render();
      }
    });
    listeners.push({ ref: pRef, ev: 'value', cb: onPlayers });

    var mRef = db.ref(roomPath() + '/moves');
    var onMove = function (snap) {
      if (!isHost || !STATE) return;
      var seat = parseInt(snap.key, 10);
      var mv = snap.val();
      db.ref(roomPath() + '/moves/' + snap.key).remove();
      if (mv && mv.action && mv.action.seat === seat && STATE.turnSeat === seat) applyHost(mv.action);
    };
    var a1 = mRef.on('child_added', onMove);
    var a2 = mRef.on('child_changed', onMove);
    listeners.push({ ref: mRef, ev: 'child_added', cb: a1 });
    listeners.push({ ref: mRef, ev: 'child_changed', cb: a2 });

    hostBeatTimer = setInterval(function () {
      if (isHost && db) db.ref(roomPath() + '/host').set({ id: myId, beat: Date.now() });
    }, BEAT_EVERY);
  }

  function applyHost(action) {
    STATE = eng().reduce(STATE, action);
    writeRoom();
    scheduleHostFollowup();
    render();
  }
  function scheduleHostFollowup() {
    if (hostTimer) { clearTimeout(hostTimer); hostTimer = null; }
    if (!isHost || !STATE) return;
    if (GAME === 'bab') {
      if (STATE.phase === 'playing' && STATE.awaitingTrickClear) {
        hostTimer = setTimeout(function () { if (isHost) applyHost({ type: 'clearTrick' }); }, TRICK_HOLD);
      } else if ((STATE.phase === 'bidding' || STATE.phase === 'playing') && isBotSeat(STATE.turnSeat)) {
        var d = STATE.phase === 'bidding' ? BID_DELAY : PLAY_DELAY;
        hostTimer = setTimeout(function () { if (!isHost) return; var a = E.botAction(STATE, botDifficulty); if (a) applyHost(a); }, d);
      } else if (STATE.phase === 'handScored') {
        hostTimer = setTimeout(function () { if (isHost) applyHost({ type: 'nextHand' }); }, NEXT_DELAY);
      }
      return;
    }
    var step = eng().autoStep(STATE, botDifficulty);
    if (step) hostTimer = setTimeout(function () { if (isHost) applyHost(step.action); }, step.delay);
  }

  function startGameOnline() {
    if (!isHost) return;
    var seatsObj = arrayToSeats(room.seats);
    var G = eng();
    STATE = G.newLobbyState(seatsObj);
    STATE = G.reduce(STATE, { type: 'startGame' });
    // Guarantee every seat carries a display name (bots included).
    for (var s = 0; s < 4; s++) {
      if (!STATE.seats[s]) STATE.seats[s] = { name: BOT_NAMES[s], isBot: true, playerId: 'bot' + s };
      else if (!STATE.seats[s].name) STATE.seats[s].name = STATE.seats[s].isBot ? BOT_NAMES[s] : ('Seat ' + s);
    }
    if (GAME === 'bab') STATE.strictMode = strictMode; // Store strictMode in state
    MODE = 'onlineGame';
    mySeat = computeMySeat(); if (mySeat < 0) mySeat = 0;
    writeRoom();
    scheduleHostFollowup();
    render();
  }

  // ---- guest: subscribe to the room doc; adopt host if the host drops ----
  function attachRoomListener() {
    detachListeners();
    var rref = db.ref(roomPath());
    var cb = rref.on('value', function (snap) {
      var v = snap.val() || {};
      if (isHost) return; // host is authoritative; ignore echoes of its own writes
      var hostNode = v.host || {};
      var r = v.doc ? safeParse(v.doc) : null;
      if (r) {
        room = r;
        GAME = (r.game && GAME_META[r.game]) ? r.game : 'bab';
        if (r.ver !== lastVer) {
          lastVer = r.ver; awaiting = false;
          if (r.phase === 'lobby') { MODE = 'onlineLobby'; STATE = null; }
          else if (r.gameJSON) { STATE = safeParse(r.gameJSON); MODE = 'onlineGame'; }
          mySeat = computeMySeat(); if (mySeat < 0) mySeat = 0;
          render();
        }
      }
      var beat = hostNode.beat || (r && r.host && r.host.beat) || 0;
      var hostId = hostNode.id || (r && r.host && r.host.id);
      if ((Date.now() - beat) > HOST_STALE && amLowestHuman(hostId)) becomeHost();
    });
    listeners.push({ ref: rref, ev: 'value', cb: cb });
  }
  function amLowestHuman(deadHostId) {
    var arr = seatsToArray();
    for (var i = 0; i < 4; i++) {
      var s = arr[i];
      if (s && !s.isBot && s.playerId && s.playerId !== deadHostId) return s.playerId === myId;
    }
    return false;
  }
  function becomeHost() {
    if (isHost) return;
    isHost = true;
    detachListeners();
    if (room && room.gameJSON && !STATE) STATE = safeParse(room.gameJSON);
    mySeat = computeMySeat(); if (mySeat < 0) mySeat = 0;
    db.ref(roomPath() + '/host').set({ id: myId, beat: Date.now() });
    writeRoom();
    startHostDuties();
    scheduleHostFollowup();
    render();
  }

  function submitOnline(action) {
    if (isHost) { applyHost(action); return; }
    if (!db) return;
    awaiting = true;
    db.ref(roomPath() + '/moves/' + mySeat).set({ action: action, ts: Date.now() });
    render();
  }

  // ----------------------------------------------------------- teardown
  function leaveToHome() {
    if (localTimer) { clearTimeout(localTimer); localTimer = null; }
    if (hostTimer) { clearTimeout(hostTimer); hostTimer = null; }
    if (hostBeatTimer) { clearInterval(hostBeatTimer); hostBeatTimer = null; }
    detachListeners();
    if (roomCode && db && myId) db.ref(roomPath() + '/players/' + myId).remove().catch(function () {});
    roomCode = null; isHost = false; room = null; roomLive = false; lastVer = -1; awaiting = false;
    STATE = null; MODE = 'home'; mySeat = 0;
    render();
  }

  // ----------------------------------------------------------- share helpers
  function copyCode() {
    if (!roomCode) return;
    if (navigator.clipboard) navigator.clipboard.writeText(roomCode).catch(function () {});
    var b = document.querySelector('[data-act="copy-code"]');
    if (b) { var t = b.textContent; b.textContent = 'Copied'; setTimeout(function () { b.textContent = t; }, 1200); }
  }
  // The invite link carries the Firebase config and the room code in the hash,
  // so a family member who taps it lands fully configured with the code prefilled.
  function inviteURL() {
    var base = location.origin + location.pathname;
    var fb = b64enc(JSON.stringify(FB));
    return base + '#fb=' + encodeURIComponent(fb) + (roomCode ? '&room=' + roomCode : '');
  }
  function copyInvite() {
    if (navigator.clipboard) navigator.clipboard.writeText(inviteURL()).catch(function () {});
    var b = document.querySelector('[data-act="copy-invite"]');
    if (b) { var t = b.textContent; b.textContent = 'Copied'; setTimeout(function () { b.textContent = t; }, 1200); }
  }
  function shareRoom() {
    if (!navigator.share) return copyInvite();
    navigator.share({
      title: 'Back Alley Bridge',
      text: 'Join my Back Alley Bridge game. Tap the link, then Play online. Room code: ' + roomCode,
      url: inviteURL()
    }).catch(function () {});
  }

  // ----------------------------------------------------------- click routing
  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-act]');
    if (!el) return;
    var act = el.getAttribute('data-act');
    switch (act) {
      case 'pick-game': {
        var g = el.getAttribute('data-game');
        if (g && GAME_META[g]) { GAME = g; MODE = 'gameSetup'; render(); }
        break;
      }
      case 'back-picker': MODE = 'home'; render(); break;
      case 'local-start': startLocal(); break;
      case 'go-online': goOnline(); break;
      case 'create-room': createRoom(); break;
      case 'join-room': joinRoom(); break;
      case 'start-game': startGameOnline(); break;
      case 'copy-code': copyCode(); break;
      case 'copy-invite': copyInvite(); break;
      case 'save-fb': saveFbConfig(); break;
      case 'copy-setup-link': copySetupLink(); break;
      case 'share-setup-link': shareSetupLink(); break;
      case 'continue-hosting': continueHosting(); break;
      case 'share-room': shareRoom(); break;
      case 'home': leaveToHome(); break;
      case 'play-again': playAgainLocal(); break;
      case 'next-hand':
        if (MODE === 'localGame') dispatchLocal({ type: 'nextHand' });
        else submitOnline({ type: 'nextHand' });
        break;
      case 'play-card': {
        var cid = el.getAttribute('data-card');
        var a1 = { type: 'play', seat: mySeat, cardId: cid };
        if (MODE === 'localGame') dispatchLocal(a1); else submitOnline(a1);
        break;
      }
      case 'bid': {
        var bt = el.getAttribute('data-bidtype');
        var bid = { type: bt };
        if (bt === 'num') bid.value = parseInt(el.getAttribute('data-bidval'), 10);
        var a2 = { type: 'bid', seat: mySeat, bid: bid };
        if (MODE === 'localGame') dispatchLocal(a2); else submitOnline(a2);
        break;
      }
      // ---- Old Maid ----
      case 'om-draw': {
        var idx = parseInt(el.getAttribute('data-index'), 10);
        doAct({ type: 'draw', seat: mySeat, index: idx });
        break;
      }
      // ---- Go Fish ----
      case 'gf-pick-rank': {
        gfRank = parseInt(el.getAttribute('data-rank'), 10);
        render();
        break;
      }
      case 'gf-cancel-rank': {
        gfRank = null;
        render();
        break;
      }
      case 'gf-ask-target': {
        var target = parseInt(el.getAttribute('data-target'), 10);
        var rank = parseInt(el.getAttribute('data-rank'), 10);
        gfRank = null;
        doAct({ type: 'ask', seat: mySeat, target: target, rank: rank });
        break;
      }
      // ---- Blow It ----
      case 'bi-roll': {
        doAct({ type: 'roll', seat: mySeat });
        break;
      }
      case 'bi-toggle-die': {
        var di = parseInt(el.getAttribute('data-index'), 10);
        var pos = biSel.indexOf(di);
        if (pos >= 0) biSel.splice(pos, 1); else biSel.push(di);
        render();
        break;
      }
      case 'bi-keep-roll': {
        var idxsR = biSel.slice(); biSel = [];
        doAct({ type: 'keep', seat: mySeat, indices: idxsR, then: 'roll' });
        break;
      }
      case 'bi-keep-bank': {
        var idxsB = biSel.slice(); biSel = [];
        doAct({ type: 'keep', seat: mySeat, indices: idxsB, then: 'bank' });
        break;
      }
      case 'bi-end-turn': {
        doAct({ type: 'endTurn', seat: mySeat });
        break;
      }
      // ---- UNO ----
      case 'uno-play': {
        var ucid = el.getAttribute('data-card');
        var ucard = (STATE.hands[mySeat] || []).filter(function (c) { return c.id === ucid; })[0];
        if (!ucard) break;
        if (ucard.kind === 'wild' || ucard.kind === 'wild4') {
          unoWildPick = { cardId: ucid, fromDrawn: false };
          render();
        } else {
          doAct({ type: 'play', seat: mySeat, cardId: ucid });
        }
        break;
      }
      case 'uno-play-drawn': {
        var dcard = (STATE.hands[mySeat] || []).filter(function (c) { return c.id === STATE.drawnCardId; })[0];
        if (dcard && (dcard.kind === 'wild' || dcard.kind === 'wild4')) {
          unoWildPick = { cardId: STATE.drawnCardId, fromDrawn: true };
          render();
        } else {
          doAct({ type: 'playDrawn', seat: mySeat });
        }
        break;
      }
      case 'uno-pick-color': {
        var col = el.getAttribute('data-color');
        if (!unoWildPick) break;
        var fromDrawn = unoWildPick.fromDrawn;
        var pcid = unoWildPick.cardId;
        unoWildPick = null;
        if (fromDrawn) doAct({ type: 'playDrawn', seat: mySeat, chosenColor: col });
        else doAct({ type: 'play', seat: mySeat, cardId: pcid, chosenColor: col });
        break;
      }
      case 'uno-cancel-wild': {
        unoWildPick = null;
        render();
        break;
      }
      case 'uno-draw': {
        unoWildPick = null;
        doAct({ type: 'draw', seat: mySeat });
        break;
      }
      case 'uno-pass': {
        doAct({ type: 'pass', seat: mySeat });
        break;
      }
      // ---- Skyjo ----
      case 'sky-draw-stock': {
        skyDiscardMode = false;
        doAct({ type: 'drawStock', seat: mySeat });
        break;
      }
      case 'sky-draw-discard': {
        skyDiscardMode = false;
        doAct({ type: 'drawDiscard', seat: mySeat });
        break;
      }
      case 'sky-discard-mode': {
        skyDiscardMode = true;
        render();
        break;
      }
      case 'sky-slot-tap': {
        var slot = parseInt(el.getAttribute('data-slot'), 10);
        var grid = STATE.grids[mySeat];
        if (skyDiscardMode && STATE.drawnFrom === 'stock') {
          // discard the held card and flip a face-down slot
          if (grid[slot] && !grid[slot].faceUp) {
            skyDiscardMode = false;
            doAct({ type: 'discardAndFlip', seat: mySeat, slot: slot });
          }
        } else {
          // swap held card into this slot (works for face-up or face-down)
          skyDiscardMode = false;
          doAct({ type: 'placeDrawn', seat: mySeat, slot: slot });
        }
        break;
      }
      case 'sky-next-round': {
        if (MODE === 'localGame') dispatchLocal({ type: 'nextRound' });
        else submitOnline({ type: 'nextRound' });
        break;
      }
      // ---- Skip-Bo ----
      case 'sb-pick-source': {
        var src = el.getAttribute('data-source');
        var scid = el.getAttribute('data-card');
        sbDiscardChoosing = false;
        if (src === 'discard') {
          sbSel = { source: 'discard', cardId: scid, discardPileIndex: parseInt(el.getAttribute('data-dpi'), 10) };
        } else {
          sbSel = { source: src, cardId: scid };
        }
        render();
        break;
      }
      case 'sb-cancel-source': {
        sbSel = null;
        render();
        break;
      }
      case 'sb-target-pile': {
        if (!sbSel) break;
        var pileIndex = parseInt(el.getAttribute('data-pile'), 10);
        var act2 = { type: 'playCard', seat: mySeat, source: sbSel.source, pileIndex: pileIndex };
        if (sbSel.source !== 'stock') act2.cardId = sbSel.cardId;
        if (sbSel.source === 'discard') act2.discardPileIndex = sbSel.discardPileIndex;
        sbSel = null;
        doAct(act2);
        break;
      }
      case 'sb-start-discard': {
        // must have a hand card selected to discard it
        if (!sbSel || sbSel.source !== 'hand') break;
        sbDiscardChoosing = true;
        render();
        break;
      }
      case 'sb-cancel-discard': {
        sbDiscardChoosing = false;
        render();
        break;
      }
      case 'sb-discard-target': {
        if (!sbDiscardChoosing || !sbSel || sbSel.source !== 'hand') break;
        var dpIndex = parseInt(el.getAttribute('data-pile'), 10);
        var handCard = STATE.hands[mySeat].filter(function (c) { return c.id === sbSel.cardId; })[0];
        if (!handCard) { sbDiscardChoosing = false; sbSel = null; render(); break; }
        var discardCardId = handCard.id;
        sbDiscardChoosing = false;
        sbSel = null;
        doAct({ type: 'discardToPile', seat: mySeat, cardId: discardCardId, discardPileIndex: dpIndex });
        break;
      }
      case 'sb-skip': {
        sbSel = null; sbDiscardChoosing = false;
        doAct({ type: 'skipTurn', seat: mySeat });
        break;
      }
    }
  });
  // route a player's own action through the correct runner (local vs online)
  function doAct(action) {
    if (MODE === 'localGame') dispatchLocal(action); else submitOnline(action);
  }

  document.addEventListener('input', function (e) {
    if (e.target && (e.target.id === 'nameInput' || e.target.id === 'nameInput2')) {
      var v = e.target.value.trim(); if (v) myName = v;
    }
  });

  var savedIdentity = loadIdentity();
  initFromHashAndSaved(savedIdentity);
  render();
})();

  
  </script>
</body>
